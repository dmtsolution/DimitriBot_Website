<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage & Découverte | Évadez-vous</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --white: #ffffff; }
        body { font-family: 'Outfit', sans-serif; margin: 0; color: #334155; }
        header { padding: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .btn { padding: 1rem 2rem; background: var(--accent); color: white; text-decoration: none; border-radius: 50px; font-weight: 600; }
        section { padding: 4rem 2rem; max-width: 1000px; margin: auto; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .card { padding: 2rem; border: 1px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight:700; font-size:1.5rem">V&D</div>
        <nav><a href="connexion.html" style="text-decoration:none; color:var(--primary); font-weight:600">Réserver maintenant</a></nav>
    </header>
    <div class="hero">
        <h1>Découvrez le monde avec nous</h1>
        <p>Des expériences uniques pour des voyageurs exceptionnels.</p>
        <br><a href="connexion.html" class="btn">Commencer l'aventure</a>
    </div>
    <section>
        <h2>Nos Destinations</h2>
        <div class="features">
            <div class="card"><h3>Montagne</h3><p>Ressourcez-vous dans les sommets.</p></div>
            <div class="card"><h3>Plage</h3><p>Le calme des eaux cristallines.</p></div>
            <div class="card"><h3>Culture</h3><p>Immergez-vous dans les traditions.</p></div>
        </div>
    </section>
</body>
</html>
