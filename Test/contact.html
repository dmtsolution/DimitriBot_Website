<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planifiez votre évasion | Voyage & Découverte</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --bg: #f1f5f9; --text: #334155; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .progress-step { font-size: 0.75rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
        .progress-step.active { color: var(--accent); font-weight: 600; }
        h2 { color: var(--primary); margin-bottom: 1.5rem; }
        .step { display: none; }
        .step.active { display: block; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: border 0.3s; }
        input:focus { border-color: var(--accent); outline: none; }
        button { width: 100%; padding: 1rem; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .btn-prev { background: #e2e8f0; color: #64748b; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <span class="progress-step active" id="p1">Profil</span>
            <span class="progress-step" id="p2">Voyage</span>
            <span class="progress-step" id="p3">Préférences</span>
        </div>
        <form id="proForm">
            <div class="step active" id="step1">
                <h2>Vos coordonnées</h2>
                <div class="form-group"><label>Nom complet</label><input type="text" name="name" placeholder="Jean Dupont" required></div>
                <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="jean@exemple.com" required></div>
                <div class="form-group"><label>Pays de résidence</label><select id="country" name="country"></select></div>
                <button type="button" onclick="next(2)">Suivant</button>
            </div>
            <div class="step" id="step2">
                <h2>Votre projet de voyage</h2>
                <div class="form-group"><label>Type de séjour</label><select name="type"><option>Détente</option><option>Aventure</option><option>Culture</option></select></div>
                <div class="form-group"><label>Date de départ</label><input type="date" name="start"></div>
                <div class="form-group"><label>Budget estimé (€)</label><input type="number" name="budget" placeholder="2000"></div>
                <button type="button" onclick="next(3)">Suivant</button>
                <button type="button" class="btn-prev" onclick="next(1)">Retour</button>
            </div>
            <div class="step" id="step3">
                <h2>Derniers détails</h2>
                <div class="form-group"><label>Nombre de voyageurs</label><input type="number" name="count" value="1"></div>
                <div class="form-group"><label>Besoins spécifiques</label><textarea name="notes" placeholder="Ex: Allergies, préférences chambres..."></textarea></div>
                <button type="submit">Confirmer ma demande</button>
                <button type="button" class="btn-prev" onclick="next(2)">Retour</button>
            </div>
        </form>
    </div>
    <script>
        function next(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            document.querySelectorAll('.progress-step').forEach(el => el.classList.remove('active'));
            document.getElementById('p' + s).classList.add('active');
        }
        fetch('https://restcountries.com/v3.1/all')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('country');
                data.sort((a,b) => a.name.common.localeCompare(b.name.common)).forEach(c => {
                    select.innerHTML += `<option>${c.name.common}</option>`;
                });
            });
    </script>
</body>
</html>
