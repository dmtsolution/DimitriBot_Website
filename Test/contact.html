<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | Voyage & Découverte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .contact-container { background: var(--card-bg); padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); max-width: 500px; width: 100%; }
        
        /* Progress Bar */
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .progress-step { font-size: 0.8rem; color: #cbd5e1; font-weight: 600; }
        .progress-step.active { color: var(--primary); }

        h2 { color: var(--text); margin-bottom: 0.5rem; font-weight: 600; text-align: center; }
        .step { display: none; }
        .step.active { display: block; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 400; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 2rem; }
        button { padding: 0.8rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; background: var(--primary); color: white; font-weight: 600; }
        button:disabled { background: #cbd5e1; }
    </style>
</head>
<body>
    <div class="contact-container">
        <!-- Progress Indicator -->
        <div class="progress-bar">
            <span class="progress-step active" id="p1">1. Identité</span>
            <span class="progress-step" id="p2">2. Voyage</span>
            <span class="progress-step" id="p3">3. Préférences</span>
        </div>

        <form id="multiStepForm">
            <!-- Step 1 -->
            <div class="step active" id="step1">
                <h2>Identité</h2>
                <div class="form-group"><label>Nom complet</label><input type="text" name="name" required></div>
                <div class="form-group"><label>Sexe</label><select name="gender"><option>Homme</option><option>Femme</option></select></div>
                <div class="form-group"><label>Pays</label><select id="country" name="country"><option>Chargement...</option></select></div>
                <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                <button type="button" onclick="nextStep(2)">Suivant</button>
            </div>

            <!-- Step 2 -->
            <div class="step" id="step2">
                <h2>Détails du Voyage</h2>
                <div class="form-group"><label>Date de départ</label><input type="date" name="travelDate" required></div>
                <div class="form-group"><label>Nombre de voyageurs</label><input type="number" name="passengers" min="1" value="1"></div>
                <div class="btn-group">
                    <button type="button" onclick="nextStep(1)">Retour</button>
                    <button type="button" onclick="nextStep(3)">Suivant</button>
                </div>
            </div>

            <!-- Step 3 -->
            <div class="step" id="step3">
                <h2>Préférences</h2>
                <div class="form-group"><label>Activités</label>
                    <input type="checkbox" name="activity" value="randonnee"> Randonnée<br>
                    <input type="checkbox" name="activity" value="plage"> Plage<br>
                    <input type="checkbox" name="activity" value="culture"> Culture
                </div>
                <div class="form-group"><label>Besoins spécifiques</label><textarea name="notes"></textarea></div>
                <div class="btn-group">
                    <button type="button" onclick="nextStep(2)">Retour</button>
                    <button type="submit">Envoyer</button>
                </div>
            </div>
        </form>
    </div>
    <script>
        function nextStep(step) {
            // Switch forms
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            // Switch progress
            document.querySelectorAll('.progress-step').forEach(p => p.classList.remove('active'));
            document.getElementById('p' + step).classList.add('active');
        }
        fetch('https://restcountries.com/v3.1/all')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('country');
                select.innerHTML = '<option value="">Choisir un pays</option>';
                data.sort((a,b) => a.name.common.localeCompare(b.name.common)).forEach(c => {
                    select.innerHTML += `<option value="${c.name.common}">${c.name.common}</option>`;
                });
            });
    </script>
</body>
</html>
