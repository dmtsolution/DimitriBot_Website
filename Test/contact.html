<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | Voyage & Découverte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .contact-container { background: var(--card-bg); padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); max-width: 500px; width: 100%; }
        h2 { color: var(--text); margin-bottom: 0.5rem; font-weight: 600; text-align: center; }
        p.subtitle { text-align: center; color: var(--secondary); margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 400; font-size: 0.9rem; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        textarea { resize: vertical; min-height: 120px; }
        button { width: 100%; background-color: var(--primary); color: white; padding: 0.8rem; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Contactez-nous</h2>
        <form>
            <div class="form-group">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="gender">Sexe</label>
                <select id="gender" name="gender" required>
                    <option value="" disabled selected>Sélectionnez votre sexe</option>
                    <option value="male">Homme</option>
                    <option value="female">Femme</option>
                </select>
            </div>
            <div class="form-group">
                <label for="country">Pays</label>
                <select id="country" name="country" required>
                    <option value="">Chargement...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit">Envoyer le message</button>
        </form>
    </div>
    <script>
        const fallbackCountries = ["France", "Belgique", "Suisse", "Canada", "Maroc", "Sénégal", "Côte d'Ivoire", "Algérie", "Tunisie"];
        const countrySelect = document.getElementById('country');
        
        // Try to fetch, but use fallback if blocked or fails
        async function loadCountries() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all');
                if (!response.ok) throw new Error('API unreachable');
                const data = await response.json();
                countrySelect.innerHTML = '<option value="" disabled selected>Sélectionnez un pays</option>';
                data.sort((a, b) => a.name.common.localeCompare(b.name.common))
                    .forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.name.common;
                        opt.textContent = c.name.common;
                        countrySelect.appendChild(opt);
                    });
            } catch (e) {
                console.warn('API fetch failed, using fallback list', e);
                countrySelect.innerHTML = '<option value="" disabled selected>Sélectionnez un pays</option>';
                fallbackCountries.sort().forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    countrySelect.appendChild(opt);
                });
            }
        }
        loadCountries();
    </script>
</body>
</html>
