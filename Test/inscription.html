<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription | Voyage & Découverte</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; }
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Créer un compte</h2>
        <form>
            <div class="form-group"><input type="text" placeholder="Nom complet" required></div>
            <div class="form-group"><input type="email" placeholder="Email" required></div>
            <div class="form-group"><input type="password" placeholder="Mot de passe" required></div>
            <div class="form-group"><input type="password" placeholder="Confirmer le mot de passe" required></div>
            <button type="submit">S'inscrire</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.9rem">Déjà un compte ? <a href="connexion.html">Connexion</a></p>
    </div>
</body>
</html>
